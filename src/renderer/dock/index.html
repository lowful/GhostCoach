<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>GhostCoach Dock</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="dock.css" />
</head>
<body>
  <!-- Just the floating ghost, no status dot, no bubble. Fully click-through;
       restore is Ctrl+Shift+M or the tray. The logo SVG is inlined so the
       pupils can aim at the center of the screen from wherever the dock sits. -->
  <div class="dock">
    <svg class="mark" width="30" height="35" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ghostBody" x1="60" y1="8" x2="60" y2="132" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#FF5E6B"/>
          <stop offset="1" stop-color="#E8323F"/>
        </linearGradient>
        <radialGradient id="ghostGlow" cx="0.5" cy="0.32" r="0.7">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
          <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </radialGradient>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#FF4655" flood-opacity="0.35"/>
        </filter>
      </defs>

      <path filter="url(#soft)" fill="url(#ghostBody)" d="
        M60 8
        C33 8 16 28 16 56
        V118
        c0 6 7 9 11 5
        l8-8 8 8c2 2 6 2 8 0
        l8-8 8 8c2 2 6 2 8 0
        l8-8 8 8c4 4 11 1 11-5
        V56
        C104 28 87 8 60 8 Z"/>

      <path fill="url(#ghostGlow)" d="M60 8C33 8 16 28 16 56v22c0-28 17-48 44-48s44 20 44 48V56C104 28 87 8 60 8Z"/>

      <!-- Eye sockets with pupils that start centered and get aimed by dock.js -->
      <circle cx="45" cy="58" r="8" fill="#0F1923"/>
      <circle cx="75" cy="58" r="8" fill="#0F1923"/>
      <circle class="pupil" cx="45" cy="58" r="2.6" fill="#00F0FF"/>
      <circle class="pupil" cx="75" cy="58" r="2.6" fill="#00F0FF"/>
    </svg>
  </div>
  <script src="dock.js"></script>
</body>
</html>
