<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" />
  <title>GhostCoach</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/ui.css" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="panel glass">
    <div class="head drag">
      <div class="brand">
        <img class="mark" src="../../../assets/logo-ghost.svg" alt="" width="18" height="21" />
        <span class="name">GhostCoach</span>
      </div>
      <div class="head-actions">
        <button id="stats" class="icon-btn no-drag" title="View Full Stats" aria-label="View Full Stats">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 20V11"/><path d="M12 20V4"/><path d="M18 20v-6"/></svg>
        </button>
        <button id="chat" class="icon-btn no-drag" title="Ask Coach" aria-label="Ask Coach">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button id="history" class="icon-btn no-drag" title="Tip history" aria-label="Tip history">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 2"/></svg>
        </button>
        <button id="settings" class="icon-btn no-drag" title="Settings (Ctrl+Shift+S)" aria-label="Settings">⚙</button>
        <button id="minimize" class="icon-btn no-drag" title="Minimize (Ctrl+Shift+M)" aria-label="Minimize">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/></svg>
        </button>
        <button id="quit" class="icon-btn no-drag" title="Quit" aria-label="Quit">✕</button>
      </div>
    </div>

    <!-- Agent check bubble: appears when coaching starts, vanishes once answered -->
    <div id="agent-bubble" class="agent-bubble no-drag" hidden>
      <div class="ab-row" id="ab-detect">
        <span class="ab-spin"></span>
        <span class="ab-q">Reading your agent...</span>
      </div>
      <div class="ab-row" id="ab-ask" hidden>
        <span class="ab-q">Playing <b id="ab-name">your agent</b>?</span>
        <div class="ab-btns">
          <button id="ab-yes" class="ab-btn ok" title="Yes, that's right">✓</button>
          <button id="ab-no"  class="ab-btn no" title="No, let me pick">✗</button>
        </div>
      </div>
      <form class="ab-row" id="ab-form" hidden>
        <input id="ab-input" class="ab-input" type="text" placeholder="Type your agent"
               maxlength="16" autocomplete="off" spellcheck="false" />
        <button id="ab-go" class="ab-btn ok" type="submit" title="Set agent">Set</button>
      </form>
      <div class="ab-row" id="ab-done" hidden>
        <span class="ab-q"><b id="ab-done-name">✓</b> locked in</span>
      </div>
      <div id="ab-quick" class="ab-quick" hidden>
        <span class="ab-quick-label">Your mains:</span>
        <div id="ab-quick-btns" class="ab-quick-btns"></div>
      </div>
    </div>

    <div class="statusline">
      <span class="dot" id="dot"></span>
      <span id="status-text">Idle</span>
      <span class="sep">·</span>
      <span id="tipcount" class="muted">0 tips</span>
    </div>

    <div class="controls">
      <button id="toggle" class="btn btn-primary toggle">
        <span class="t-ico">▶</span><span class="t-label">Start Coaching</span>
      </button>
      <button id="pause" class="icon-btn lg" title="Pause / Resume (Ctrl+Shift+P)" disabled>⏸</button>
    </div>

    <button class="last-tip no-drag" id="last-tip" title="Open tip history">
      <span class="lt-dot"></span>
      <span class="lt-text">No tips yet, start coaching.</span>
    </button>
  </div>

  <script src="panel.js"></script>
</body>
</html>
