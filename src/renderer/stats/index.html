<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" />
  <title>GhostCoach Stats</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/ui.css" />
  <link rel="stylesheet" href="stats.css" />
</head>
<body>
  <div class="sheet glass">
    <header class="drag">
      <div class="h-brand">
        <img src="../../../assets/logo-ghost.svg" alt="" width="16" height="19" />
        <h2>Stats</h2>
      </div>
      <div class="h-actions">
        <button id="askcoach" class="icon-btn no-drag" title="Ask Coach" aria-label="Ask Coach">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button id="close" class="icon-btn no-drag" title="Close">✕</button>
      </div>
    </header>

    <div class="body">
      <section>
        <h3>Overview</h3>
        <div class="cards" id="cards"></div>
        <div id="rank-notes" class="rank-notes" hidden></div>
      </section>

      <section>
        <div class="sec-head">
          <h3>Recent Matches</h3>
          <div class="sec-tools">
            <span id="updated" class="updated"></span>
            <button id="refresh" class="mini-btn no-drag">Refresh</button>
          </div>
        </div>
        <div id="match-list" class="list"></div>
        <p id="match-empty" class="empty" hidden></p>
      </section>

      <section>
        <h3>Coaching Sessions</h3>
        <div id="session-list" class="list"></div>
        <p id="session-empty" class="empty" hidden>Finish a coached match to see your first session here.</p>
      </section>
    </div>
  </div>

  <script src="stats.js"></script>
</body>
</html>
